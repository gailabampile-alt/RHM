  <script>
  let countdown = 60;
  const countdownElement = document.getElementById('countdown');
  const resendLink = document.getElementById('resend-link');

  function startCountdown() {
    resendLink.classList.add('disabled-link');
    countdown = 60;
    countdownElement.textContent = `(${countdown})`;

    const timer = setInterval(() => {
      countdown--;
      countdownElement.textContent = `(${countdown})`;
      if (countdown <= 0) {
        clearInterval(timer);
        countdownElement.textContent = '';
        resendLink.classList.remove('disabled-link');

        // Redémarrer le compte à rebours après 5 secondes
        setTimeout(startCountdown, 5000); // délai avant redémarrage
      }
    }, 1000);
  }

  // Lancer le premier compte à rebours
  startCountdown();
</script>
